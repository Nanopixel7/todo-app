name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to create (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PomodoroStudy.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PomodoroStudy-apk
          path: PomodoroStudy.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          name: Pomodoro Study Tracker ${{ inputs.version || github.ref_name }}
          tag_name: ${{ inputs.version || github.ref_name }}
          files: PomodoroStudy.apk
          body: |
            ## Pomodoro Study Tracker — ${{ github.ref_name }}

            A clean, offline, native Android Pomodoro timer for studying
            **Chinese**, **Book Reading**, and **Code Learning** (3h daily goal each),
            with History and Stats.

            ### Install
            1. Download **PomodoroStudy.apk** below onto your Android phone.
            2. Open it. If prompted, allow **"Install from unknown sources"** for your browser/file manager.
            3. Tap Install — done. Works fully offline, no account needed.

            > This is a debug-signed build for easy sideloading. Android 8.0+ required.
